services:
  recrew:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recrew-v4
    env_file: .env
    volumes:
      - ./reports:/app/reports
    network_mode: host
    security_opt:
      - seccomp:unconfined
    shm_size: "2gb"
    command: ${TARGET_URL:-https://example.com}
    restart: "no"
